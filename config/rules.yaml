required_fields:
  - Email
  - First Name

email:
  column_name: "Email"
  normalize_to_lowercase: true
  strip_whitespace: true
  disposable_domains:
    - mailinator.com
    - guerrillamail.com
    - tempmail.com
    - throwaway.email
    - yopmail.com
    - spamgourmet.com
    - fakeinbox.com
    - mailnull.com
    - discard.email
    - trashmail.com
  personal_domains:
    - gmail.com
    - yahoo.com
    - hotmail.com
    - outlook.com
    - aol.com
    - icloud.com
    - me.com
    - mac.com
    - live.com
    - msn.com
    - protonmail.com
    - zoho.com

names:
  first_name_column: "First Name"
  last_name_column: "Last Name"
  apply_title_case: true
  strip_whitespace: true
  suspicious_name_values:
    - "test"
    - "n/a"
    - "unknown"
    - "none"
    - "null"
    - "asdf"
    - "123"

company:
  column_name: "Company"
  collapse_spaces: true
  strip_whitespace: true
  apply_title_case: true
  suspicious_company_values:
    - "test"
    - "n/a"
    - "unknown"
    - "none"
    - "null"
    - "asdf"
    - "123"
    - "company"
    - "acme"

job_title:
  column_name: "Job Title"
  strip_whitespace: true
  always_uppercase_words:
    - "VP"
    - "CEO"
    - "CFO"
    - "COO"
    - "CTO"
    - "CMO"
    - "CRO"
    - "SVP"
    - "EVP"
    - "AVP"
    - "MD"
    - "HR"
    - "IT"
  always_lowercase_words:
    - "of"
    - "the"
    - "and"
    - "in"
    - "at"
    - "for"
  suspicious_title_values:
    - "test"
    - "n/a"
    - "na"
    - "unknown"
    - "none"
    - "null"
    - "asdf"
    - "employee"
    - "staff"

country:
  column_name: "Country"
  normalization_map:
    "US": "United States"
    "USA": "United States"
    "U.S.": "United States"
    "U.S.A.": "United States"
    "United States of America": "United States"
    "america": "United States"
    "UK": "United Kingdom"
    "U.K.": "United Kingdom"
    "Great Britain": "United Kingdom"
    "England": "United Kingdom"
    "CA": "Canada"
    "CAN": "Canada"
    "AU": "Australia"
    "AUS": "Australia"
    "DE": "Germany"
    "Deutschland": "Germany"
    "FR": "France"
    "IN": "India"
    "JP": "Japan"
    "BR": "Brazil"
    "NL": "Netherlands"
    "The Netherlands": "Netherlands"
    "Holland": "Netherlands"
    "SG": "Singapore"
    "IE": "Ireland"
    "ES": "Spain"
    "IT": "Italy"
    "SE": "Sweden"
    "CH": "Switzerland"
    "MX": "Mexico"

