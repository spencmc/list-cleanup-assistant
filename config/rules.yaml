    "DC": "District of Columbia"
    "Calif.": "California"
    "Fla.": "Florida"
    "N.Y.": "New York"
    "Tex.": "Texas"

duplicates:
  check_email: true
  check_company_and_name: true
  check_email_and_company: true
  fuzzy_match_threshold: 85

quality_score:
  valid_email_rate: 30
  no_duplicates: 20
  required_fields_complete: 20
  name_company_quality: 15
  no_disposable_personal: 15
  risk_levels:
    low: 85
    medium: 65
    high: 40

output:
  output_directory: "outputs"
  cleaned_csv_filename: "cleaned_list.csv"
  qa_report_pdf_filename: "qa_report.pdf"
  qa_report_json_filename: "qa_report.json"
  include_original_values: true
  include_flag_columns: true
